# GitGuardian (ggshield) configuration.
# https://docs.gitguardian.com/ggshield-docs/reference/config
#
# The repo's seed/test fixtures intentionally contain well-known, non-production
# credentials (AGENTS.md §9 — e.g. "mimaric2026"). They are NOT real secrets and
# never reach production; users authenticate against hashed DB records. We exclude
# the fixture paths so GitGuardian PR checks stop flagging them. Real secrets live
# only in gitignored .env.local files and CI job env — never committed.
version: 2

secret:
  ignored-paths:
    - packages/db/prisma/seed.ts
    - packages/db/prisma/seed-demo.ts
    - "**/*.spec.ts"        # Playwright e2e use the same documented test logins
    - "**/*.e2e.ts"
  ignored-matches:
    - name: Mimarek documented seed/test password (mimaric2026)
      match: mimaric2026
    - name: Mimarek documented seed/test password (sales2026)
      match: sales2026
    - name: Mimarek documented seed/test password (finance2026)
      match: finance2026
